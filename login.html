<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { ungu: { utama:'#6B21A8' } } } } }
    </script>
    <style>.bg-gradasi { background: linear-gradient(135deg, #050505 0%, #1A102E 40%, #4C1D95 100%); }</style>
</head>
<body class="bg-gradasi min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="w-full max-w-md bg-white/95 rounded-xl p-8 shadow-2xl text-center">
        <div class="mb-6">
            <div class="text-3xl font-bold text-ungu-utama">⚡ Xdnry777</div>
            <p class="text-gray-500 mt-2">Silakan Masuk Akun</p>
        </div>

        <button onclick="loginGoogle()" class="w-full flex items-center justify-center border border-gray-300 rounded-lg py-3 px-4 hover:bg-gray-50 transition mb-6">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-6 h-6 mr-3">
            <span class="font-medium text-gray-700">Masuk dengan Google</span>
        </button>

        <a href="index.html" class="inline-block text-ungu-utama hover:text-ungu-terang"><i class="fa fa-arrow-left mr-1"></i>Kembali ke Beranda</a>
    </div>

    <script src="auth.js"></script>
    <script>
        function loginGoogle() {
            const nama = prompt('Masukkan Nama Lengkap:');
            const email = prompt('Masukkan Email Google:');
            if (nama && email) {
                setLogin(nama, email);
                alert('✅ Berhasil Masuk! Selamat Datang ' + nama);
                window.location.href = 'pilih-game.html';
            } else {
                alert('❌ Login dibatalkan!');
            }
        }
    </script>
</body>
</html>
