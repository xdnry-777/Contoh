<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { ungu: { gelap:'#2D0C5E', utama:'#6B21A8', terang:'#A855F7', neon:'#D946EF' } } } } }
    </script>
    <style>
        .bg-gradasi { background: linear-gradient(135deg, #050505 0%, #1A102E 40%, #4C1D95 100%); }
        .bg-card { background: linear-gradient(145deg, rgba(107,33,168,0.2), rgba(45,12,94,0.3)); }
    </style>
</head>
<body class="bg-gradasi min-h-screen font-sans text-white">
    <nav class="backdrop-blur-md bg-black/30 sticky top-0 z-50 border-b border-ungu-utama/30">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-2xl font-bold text-ungu-terang">⚡Xdnry777</div>
        </div>
    </nav>

    <section class="container mx-auto px-4 py-10">
        <a href="pilih-game.html" class="inline-flex items-center text-ungu-terang mb-6"><i class="fa fa-arrow-left mr-2"></i>Kembali</a>
        <h1 class="text-2xl font-bold mb-8 text-center">Selesaikan Pembayaran</h1>

        <div class="max-w-xl mx-auto space-y-6">
            <div class="bg-card rounded-xl p-6 border border-ungu-utama/40">
                <h2 class="text-lg font-semibold mb-4 border-b border-ungu-utama/30 pb-2">Ringkasan Pesanan</h2>
                <div class="space-y-2 text-gray-300">
                    <div class="flex justify-between"><span>Layanan</span><span id="tNama">-</span></div>
                    <div class="flex justify-between"><span>ID Akun</span><span id="tId">-</span></div>
                    <div class="flex justify-between"><span>Nickname</span><span id="tNick">-</span></div>
                    <div class="flex justify-between"><span>Item</span><span id="tItem">-</span></div>
                    <div class="flex justify-between font-bold text-ungu-terang pt-2 border-t border-ungu-utama/30"><span>Total Bayar</span><span id="tTotal">-</span></div>
                </div>
            </div>

            <div class="bg-card rounded-xl p-6 border border-ungu-utama/40">
                <h2 class="text-lg font-semibold mb-4">Metode Pembayaran</h2>
                <div class="mb-5 p-3 border border-ungu-terang/50 rounded-lg bg-ungu-terang/10">
                    <label class="flex items-center gap-3"><input type="radio" name="bayar" checked class="w-5 h-5 accent-ungu-terang"><span class="text-xl font-bold">QRIS</span><span class="text-xs bg-ungu-neon px-2 py-0.5 rounded">NOXZCRUEL</span></label>
                </div>
                <div class="p-3 border border-ungu-utama/30 rounded-lg">
                    <label class="flex items-center gap-3"><input type="radio" name="bayar" class="w-5 h-5 accent-ungu-terang"><span class="text-xl font-bold">DANA</span><span class="text-xs bg-blue-500 px-2 py-0.5 rounded">Resmi</span></label>
                    <div class="mt-3 pl-8">
                        <p class="text-xl font-bold text-ungu-terang">0851-6993-5089</p>
                        <p class="text-sm text-gray-400">a.n. EN**** YU******</p>
                        <p class="text-sm text-yellow-400 mt-2">+50 → <span id="totalBayar">-</span></p>
                    </div>
                </div>
            </div>

            <button onclick="sudahBayar()" class="w-full bg-gradient-to-r from-ungu-utama to-ungu-neon py-4 rounded-xl font-bold text-lg">
                <i class="fa fa-check-circle mr-2"></i>Saya Sudah Bayar
            </button>
        </div>
    </section>

    <script>
        window.onload = function() {
            document.getElementById('tNama').textContent = localStorage.getItem('namaGame');
            document.getElementById('tId').textContent = localStorage.getItem('id');
            document.getElementById('tNick').textContent = localStorage.getItem('nickname');
            document.getElementById('tItem').textContent = localStorage.getItem('item');
            let harga = parseInt(localStorage.getItem('hargaDasar').replace('.',''));
            let total = harga + 50;
            localStorage.setItem('totalAkhir', total);
            document.getElementById('tTotal').textContent = 'Rp ' + total.toLocaleString('id-ID');
            document.getElementById('totalBayar').textContent = 'Rp ' + total.toLocaleString('id-ID');
        }
        function sudahBayar() {
            const pesan = `📋 *STRUK XDNRY777*
✅ BERHASIL

🎮 Game: ${localStorage.getItem('namaGame')}
👤 ID: ${localStorage.getItem('id')}
💬 Nick: ${localStorage.getItem('nickname')}
💎 Item: ${localStorage.getItem('item')}
💰 Bayar: Rp ${localStorage.getItem('totalAkhir')?.toLocaleString('id-ID')}

Terima Kasih!`;
            window.open(`https://wa.me/6285169935089?text=${encodeURIComponent(pesan)}`,'_blank');
            setTimeout(()=>window.location.href='struk.html', 600);
        }
    </script>
</body>
</html>
