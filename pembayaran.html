<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ungu: {
                            gelap: '#2D0C5E',
                            utama: '#6B21A8',
                            terang: '#A855F7',
                            neon: '#D946EF'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .bg-gradasi { background: linear-gradient(135deg, #050505 0%, #1A102E 40%, #4C1D95 100%); }
        .bg-card { background: linear-gradient(145deg, rgba(107,33,168,0.2), rgba(45,12,94,0.3)); }
    </style>
</head>
<body class="bg-gradasi min-h-screen font-sans text-white">
    <nav class="backdrop-blur-md bg-black/30 sticky top-0 z-50 border-b border-ungu-utama/30">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-2xl font-bold text-ungu-terang">⚡ Xdnry777</div>
        </div>
    </nav>

    <section class="container mx-auto px-4 py-10">
        <a href="pilih-game.html" class="inline-flex items-center text-ungu-terang mb-6 hover:text-ungu-neon">
            <i class="fa fa-arrow-left mr-2"></i> Kembali
        </a>
        <h1 class="text-2xl font-bold mb-8 text-center">Selesaikan Pembayaran</h1>

        <div class="max-w-xl mx-auto space-y-6">
            <!-- Ringkasan Pesanan -->
            <div class="bg-card rounded-xl p-6 border border-ungu-utama/40">
                <h2 class="text-lg font-semibold mb-4 border-b border-ungu-utama/30 pb-2">Ringkasan Pesanan</h2>
                <div class="space-y-2 text-gray-300">
                    <div class="flex justify-between"><span>Layanan</span><span id="tNama" class="font-medium text-white">-</span></div>
                    <div class="flex justify-between"><span>ID Akun</span><span id="tId" class="font-medium text-white">-</span></div>
                    <div class="flex justify-between"><span>Nickname</span><span id="tNick" class="font-medium text-white">-</span></div>
                    <div class="flex justify-between"><span>Item</span><span id="tItem" class="font-medium text-white">-</span></div>
                    <div class="flex justify-between font-bold text-ungu-terang pt-2 border-t border-ungu-utama/30">
                        <span>Total Bayar</span><span id="tTotal">-</span>
                    </div>
                </div>
            </div>

            <!-- Metode Pembayaran -->
            <div class="bg-card rounded-xl p-6 border border-ungu-utama/40">
                <h2 class="text-lg font-semibold mb-4">Pilih Metode Pembayaran</h2>

                <!-- QRIS -->
                <label class="mb-5 p-4 border border-ungu-terang/50 rounded-lg bg-ungu-terang/10 flex items-center gap-3 cursor-pointer block">
                    <input type="radio" name="metodeBayar" value="QRIS" checked class="w-5 h-5 accent-ungu-terang">
                    <span class="text-xl font-bold">QRIS</span>
                    <span class="text-xs bg-ungu-neon px-2 py-0.5 rounded">NOXZCRUEL</span>
                </label>
                <div class="mb-5 text-center">
                    <div class="bg-white p-4 rounded-lg inline-block">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=NOXZCRUEL" alt="QRIS" class="w-44 h-44 rounded">
                    </div>
                    <p class="text-sm text-gray-400 mt-3">Scan kode QRIS dari aplikasi pembayaran apa saja</p>
                </div>

                <!-- DANA -->
                <label class="p-4 border border-ungu-utama/30 rounded-lg flex items-center gap-3 cursor-pointer block">
                    <input type="radio" name="metodeBayar" value="DANA" class="w-5 h-5 accent-ungu-terang">
                    <span class="text-xl font-bold">DANA</span>
                    <span class="text-xs bg-blue-500 px-2 py-0.5 rounded">Resmi</span>
                </label>
                <div class="mt-3 pl-8 mb-2">
                    <p class="text-xl font-bold text-ungu-terang">0851-6993-5089</p>
                    <p class="text-sm text-gray-400">a.n. EN**** YU******</p>
                    <p class="text-sm text-yellow-400 mt-2">+ Kode Unik Rp 50 → <b id="totalBayar">-</b></p>
                </div>
            </div>

            <button onclick="sudahBayar()" class="w-full bg-gradient-to-r from-ungu-utama to-ungu-neon py-4 rounded-xl font-bold text-lg hover:opacity-90">
                <i class="fa fa-check-circle mr-2"></i> Saya Sudah Bayar
            </button>
        </div>
    </section>

    <script>
        window.onload = function() {
            const namaGame = localStorage.getItem('namaGame');
            const id = localStorage.getItem('id');
            const nick = localStorage.getItem('nickname');
            const item = localStorage.getItem('item');
            const harga = localStorage.getItem('hargaDasar');

            if(namaGame) document.getElementById('tNama').textContent = namaGame;
            if(id) document.getElementById('tId').textContent = id;
            if(nick) document.getElementById('tNick').textContent = nick;
            if(item) document.getElementById('tItem').textContent = item;

            if(harga) {
                let hargaBersih = parseInt(harga.replace(/\./g,''));
                let total = hargaBersih + 50;
                localStorage.setItem('totalAkhir', total);
                document.getElementById('tTotal').textContent = 'Rp ' + total.toLocaleString('id-ID');
                document.getElementById('totalBayar').textContent = 'Rp ' + total.toLocaleString('id-ID');
            }
        }

        function sudahBayar() {
            // Ambil metode yang dipilih
            const metodeTerpilih = document.querySelector('input[name="metodeBayar"]:checked').value;

            const nama = localStorage.getItem('namaGame') || '-';
            const id = localStorage.getItem('id') || '-';
            const nick = localStorage.getItem('nickname') || '-';
            const item = localStorage.getItem('item') || '-';
            const total = localStorage.getItem('totalAkhir')?.toLocaleString('id-ID') || '-';

            // Pesan WA sesuai format yang kamu mau
            const pesan = `📋 STRUK XDNRY777
✅ BERHASIL

🎮 Game: ${nama}
👤 ID: ${id}
💬 Nick: ${nick}
💎 Item: ${item}
💳 Metode Bayar: ${metodeTerpilih}
💰 Bayar: Rp ${total}

Terima Kasih!`;

            window.open(`https://wa.me/6285169935089?text=${encodeURIComponent(pesan)}`, '_blank');
            setTimeout(() => window.location.href = 'struk.html', 600);
        }
    </script>
</body>
</html>
